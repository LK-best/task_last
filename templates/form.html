<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
    integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
    crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" />
    <title>Пример формы</title>
  </head>
  <body>
    <h1>Форма для регистрации в суперсекретной системе</h1>
    <div>
        <form class="login_form" method="post" action="/">
            <div class="form-group">
                <input type="name" class="form-control" id="name" placeholder="Введите фамилию" name="name">
            </div>
            <div class="form-group">
                <input type="surname" class="form-control" id="surname" placeholder="Введите имя" name="surname">
            </div>
            <div class="form-group">
                <label for="classSelect">Какое у вас образование</label>
                <select class="form-control" id="classSelect" name="education">
                  <option>начальное</option>
                  <option>среднее</option>
                  <option>несреднее</option>
                  <option>неполовину среднее</option>
                  <option>уже не среднее</option>
                </select>
            </div>
            <div class="form-group">
                <label for="photo">Приложите фотографию</label>
                <input type="file" class="form-control-file" id="photo" name="file">
            </div>
            <div class="form-group">
                <label>Какая у вас профессия?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof1" value="инженер жизнеобеспечения" checked>
                    <label class="form-check-label" for="prof1">инженер жизнеобеспечения</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof2" value="пилот">
                    <label class="form-check-label" for="prof2">пилот</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof3" value="инженер-исследователь">
                    <label class="form-check-label" for="prof3">инженер-исследователь</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof4" value="строитель">
                    <label class="form-check-label" for="prof4">строитель</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof5" value="экзобиолог">
                    <label class="form-check-label" for="prof5">экзобиолог</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof6" value="инженер по терраформированию">
                    <label class="form-check-label" for="prof6">инженер по терраформированию</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof7" value="климатолог">
                    <label class="form-check-label" for="prof7">климатолог</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="profession" id="prof8" value="специалист по радиационной защите">
                    <label class="form-check-label" for="prof8">специалист по радиационной защите</label>
                </div>
            </div>
            <div class="form-group">
                <label>Укажите пол</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="sex" id="male" value="male" checked>
                    <label class="form-check-label" for="male">Мужской</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="sex" id="female" value="female">
                    <label class="form-check-label" for="female">Женский</label>
                </div>
            </div>
            <div class="form-group">
                <label for="about">Немного о себе</label>
                <textarea class="form-control" id="about" rows="3" name="about"></textarea>
            </div>
            <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="acceptRules" name="accept">
                <label class="form-check-label" for="acceptRules">Готов остаться на Марсе</label>
            </div>
            <button type="submit" class="btn btn-primary">Отправить</button>
        </form>
    </div>
  </body>
</html>
